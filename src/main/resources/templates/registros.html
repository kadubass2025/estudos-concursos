<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro Diário — Estudos Concursos</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f4f8; }
        .card-header-custom { background-color: #6C3483; color: white; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid py-4 px-4">

    <h2 class="fw-bold mb-4" style="color: #6C3483;">📝 Registro Diário de Estudos</h2>

    <!-- Mensagem de sucesso -->
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">

        <!-- Formulário -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header fw-bold card-header-custom">
                    ➕ Novo Registro
                </div>
                <div class="card-body">
                    <form th:action="@{/registros/salvar}"
                          th:object="${registro}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Data</label>
                            <input type="date" class="form-control"
                                   th:field="*{data}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Matéria</label>
                            <select class="form-select" name="materia.id" required>
                                <option value="">Selecione...</option>
                                <option th:each="m : ${materias}"
                                        th:value="${m.id}"
                                        th:text="${m.nome}"
                                        th:selected="${registro.materia != null
                                       and registro.materia.id == m.id}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Assunto Estudado</label>
                            <input type="text" class="form-control"
                                   th:field="*{assunto}"
                                   placeholder="Ex: Princípios Fundamentais" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tipo de Estudo</label>
                            <select class="form-select" th:field="*{tipo}">
                                <option value="">Selecione...</option>
                                <option th:each="t : ${tipos}"
                                        th:value="${t}" th:text="${t}">
                                </option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col mb-3">
                                <label class="form-label fw-bold">Tempo Planejado (min)</label>
                                <input type="number" class="form-control"
                                       th:field="*{tempoPlanejado}" min="1">
                            </div>
                            <div class="col mb-3">
                                <label class="form-label fw-bold">Tempo Real (min)</label>
                                <input type="number" class="form-control"
                                       th:field="*{tempoReal}" min="1">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col mb-3">
                                <label class="form-label fw-bold">Questões Resolvidas</label>
                                <input type="number" class="form-control"
                                       th:field="*{questoesResolvidas}" min="0">
                            </div>
                            <div class="col mb-3">
                                <label class="form-label fw-bold">Acertos</label>
                                <input type="number" class="form-control"
                                       th:field="*{acertos}" min="0">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Observações</label>
                            <textarea class="form-control" th:field="*{observacoes}"
                                      rows="2" placeholder="Anotações importantes...">
              </textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn fw-bold"
                                    style="background-color: #6C3483; color: white;">
                                💾 Salvar Registro
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Lista de Registros -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header fw-bold card-header-custom">
                    📋 Registros de Estudo
                </div>
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(registros)}"
                         class="text-muted text-center py-4">
                        Nenhum registro ainda. Comece registrando seu estudo!
                    </div>
                    <div class="table-responsive"
                         th:if="${!#lists.isEmpty(registros)}">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Data</th>
                                <th>Matéria</th>
                                <th>Assunto</th>
                                <th>Tipo</th>
                                <th>Tempo</th>
                                <th>Questões</th>
                                <th>% Acerto</th>
                                <th>Ações</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="r : ${registros}">
                                <td th:text="${#temporals.format(r.data,'dd/MM/yyyy')}">-</td>
                                <td class="fw-bold" th:text="${r.materia?.nome}">-</td>
                                <td th:text="${r.assunto}">-</td>
                                <td><span class="badge bg-secondary"
                                          th:text="${r.tipo}">-</span></td>
                                <td th:text="${r.tempoReal} + ' min'">-</td>
                                <td th:text="${r.acertos} + '/' + ${r.questoesResolvidas}">-</td>
                                <td>
                    <span th:text="${#numbers.formatDecimal(r.percentualAcerto,1,1)} + '%'"
                          th:class="${r.percentualAcerto >= 70}
                                    ? 'text-success fw-bold'
                                    : 'text-danger fw-bold'">
                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/registros/editar/{id}(id=${r.id})}"
                                       class="btn btn-sm btn-warning me-1">✏️</a>
                                    <a th:href="@{/registros/deletar/{id}(id=${r.id})}"
                                       class="btn btn-sm btn-danger"
                                       onclick="return confirm('Deseja deletar este registro?')">
                                        🗑️
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
<div th:replace="~{fragments/cronometro :: cronometro}"></div>
</body>
</html>
