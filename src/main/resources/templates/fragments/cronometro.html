<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="cronometro">

    <!-- Widget flutuante -->
    <div id="cronometro-widget" style="
       position:fixed; bottom:24px; right:24px; z-index:9999;
       width:310px; background:white; border-radius:16px;
       box-shadow:0 8px 32px rgba(0,0,0,0.18);
       border:2px solid #1B3A6B; display:none;">

        <!-- Header -->
        <div style="background:#1B3A6B; color:white; padding:10px 14px;
                display:flex; justify-content:space-between;
                align-items:center; border-radius:14px 14px 0 0;">
      <span style="font-weight:bold; font-size:0.9rem;">
        ⏱ Cronômetro de Estudo
      </span>
            <button onclick="minimizarCrono()"
                    style="background:none; border:none; color:white;
                     cursor:pointer; font-size:1.1rem;">
                ➖
            </button>
        </div>

        <!-- Body -->
        <div style="padding:14px;">

            <!-- Display -->
            <div id="cronoDisplay"
                 style="font-size:2.4rem; font-weight:bold; text-align:center;
                  color:#1B3A6B; font-family:'Courier New',monospace;
                  letter-spacing:2px; margin-bottom:12px;">
                00:00:00
            </div>

            <!-- Status -->
            <div id="cronoStatus" style="text-align:center; font-size:0.8rem;
           margin-bottom:8px; color:#7F8C8D; display:none;">
                ⚡ Cronômetro rodando em segundo plano
            </div>

            <!-- Botões -->
            <div style="display:flex; gap:6px; justify-content:center;
                  margin-bottom:12px;">
                <button id="btnIniciar" onclick="iniciarCrono()"
                        style="background:#27AE60; color:white; border:none;
                       border-radius:8px; padding:6px 12px;
                       font-weight:bold; cursor:pointer;">
                    ▶ Iniciar
                </button>
                <button id="btnPausar" onclick="pausarCrono()" disabled
                        style="background:#E67E22; color:white; border:none;
                       border-radius:8px; padding:6px 12px;
                       font-weight:bold; cursor:pointer; opacity:0.5;">
                    ⏸ Pausar
                </button>
                <button id="btnParar" onclick="pararCrono()" disabled
                        style="background:#C0392B; color:white; border:none;
                       border-radius:8px; padding:6px 12px;
                       font-weight:bold; cursor:pointer; opacity:0.5;">
                    ⏹ Parar
                </button>
                <button onclick="resetarCrono()"
                        style="background:#95A5A6; color:white; border:none;
                       border-radius:8px; padding:6px 10px;
                       font-weight:bold; cursor:pointer;">
                    🔄
                </button>
            </div>

            <!-- Matéria -->
            <div style="margin-bottom:10px;">
                <label style="font-size:0.78rem; font-weight:bold;
                      color:#7F8C8D; margin-bottom:4px; display:block;">
                    📚 Matéria sendo estudada:
                </label>
                <select id="cronoMateria"
                        style="width:100%; border:1px solid #dee2e6;
                       border-radius:8px; padding:6px 8px;
                       font-size:0.82rem; color:#2C3E50;">
                    <option value="">Selecione a matéria...</option>
                </select>
            </div>

            <!-- Assunto -->
            <div style="margin-bottom:10px;">
                <label style="font-size:0.78rem; font-weight:bold;
                      color:#7F8C8D; margin-bottom:4px; display:block;">
                    📝 Assunto estudado:
                </label>
                <input type="text" id="cronoAssunto"
                       placeholder="Ex: Princípios Fundamentais"
                       style="width:100%; border:1px solid #dee2e6;
                      border-radius:8px; padding:6px 8px;
                      font-size:0.82rem; color:#2C3E50;">
            </div>

            <!-- Resultado -->
            <div id="cronoResultado" style="display:none; margin-top:10px;">
                <div style="background:#D5F0E0; border-radius:8px; padding:10px;
                    text-align:center;">
                    <div style="font-size:0.85rem; color:#1A6B3A; font-weight:bold;">
                        ✅ Sessão finalizada!
                    </div>
                    <div style="font-size:0.8rem; color:#555; margin-top:4px;">
                        Tempo: <strong id="tempoRegistrado" style="color:#1B3A6B;">
                        00:00:00
                    </strong>
                    </div>
                    <div id="cronoSalvoMsg"
                         style="font-size:0.78rem; color:#1A6B3A;
                      margin-top:4px; display:none;">
                        💾 Salvo no Registro Diário!
                    </div>
                    <div style="margin-top:8px; display:flex; gap:6px;
                      justify-content:center;">
                        <button onclick="salvarRegistro()" id="btnSalvarRegistro"
                                style="background:#1B3A6B; color:white; border:none;
                           border-radius:8px; padding:5px 12px;
                           font-size:0.8rem; font-weight:bold;
                           cursor:pointer;">
                            💾 Salvar no Registro
                        </button>
                        <button onclick="resetarCrono()"
                                style="background:#95A5A6; color:white; border:none;
                           border-radius:8px; padding:5px 10px;
                           font-size:0.8rem; font-weight:bold;
                           cursor:pointer;">
                            🔄 Novo
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Botão minimizado -->
    <div id="cronometro-mini" onclick="maximizarCrono()"
         style="display:none; position:fixed; bottom:24px; right:24px;
              z-index:9999; width:56px; height:56px; border-radius:50%;
              background:#1B3A6B; color:white; cursor:pointer;
              align-items:center; justify-content:center;
              font-size:1.6rem; box-shadow:0 4px 16px rgba(0,0,0,0.2);">
        ⏱
    </div>

    <!-- Indicador flutuante quando rodando e minimizado -->
    <div id="cronoIndicador" style="display:none; position:fixed;
       bottom:88px; right:24px; z-index:9998; background:#27AE60;
       color:white; border-radius:12px; padding:4px 10px;
       font-size:0.75rem; font-weight:bold;
       box-shadow:0 2px 8px rgba(0,0,0,0.2);">
        ▶ <span id="cronoIndicadorTempo">00:00:00</span>
    </div>

    <script>
        // ── Chaves do localStorage ───────────────────────────────────────
        const CRONO_KEY = {
          RODANDO:    'crono_rodando',
          SEGUNDOS:   'crono_segundos',
          INICIO:     'crono_inicio_timestamp',
          MATERIA_ID: 'crono_materia_id',
          ASSUNTO:    'crono_assunto',
          PAUSADO_EM: 'crono_pausado_em',
          VISIVEL:    'crono_visivel'
        };

        let cronoIntervalo = null;

        // ── Inicialização — restaura estado ao carregar página ───────────
        document.addEventListener('DOMContentLoaded', () => {
          carregarMaterias().then(() => {
            restaurarEstado();
          });
        });

        function restaurarEstado() {
          const rodando   = localStorage.getItem(CRONO_KEY.RODANDO) === 'true';
          const visivel   = localStorage.getItem(CRONO_KEY.VISIVEL) === 'true';
          const materiaId = localStorage.getItem(CRONO_KEY.MATERIA_ID);
          const assunto   = localStorage.getItem(CRONO_KEY.ASSUNTO);

          // Restaura matéria e assunto
          if (materiaId) {
            document.getElementById('cronoMateria').value = materiaId;
          }
          if (assunto) {
            document.getElementById('cronoAssunto').value = assunto;
          }

          // Calcula segundos acumulados
          const segundosSalvos = parseInt(
            localStorage.getItem(CRONO_KEY.SEGUNDOS) || '0');
          const inicioTs = localStorage.getItem(CRONO_KEY.INICIO);

          let totalSegundos = segundosSalvos;
          if (rodando && inicioTs) {
            const agora = Date.now();
            const decorrido = Math.floor((agora - parseInt(inicioTs)) / 1000);
            totalSegundos = segundosSalvos + decorrido;
          }

          atualizarDisplayComValor(totalSegundos);

          if (rodando) {
            // Retoma o cronômetro
            document.getElementById('cronoDisplay').style.color = '#27AE60';
            document.getElementById('cronoStatus').style.display = 'block';
            setBtn('btnIniciar', true);
            setBtn('btnPausar',  false);
            setBtn('btnParar',   false);

            cronoIntervalo = setInterval(() => {
              const ini = parseInt(
                localStorage.getItem(CRONO_KEY.INICIO) || '0');
              const base = parseInt(
                localStorage.getItem(CRONO_KEY.SEGUNDOS) || '0');
              const agora = Date.now();
              const total = base + Math.floor((agora - ini) / 1000);
              atualizarDisplayComValor(total);
              atualizarIndicador(total, true);
            }, 1000);

            // Mostra indicador se widget fechado
            if (!visivel) {
              document.getElementById('cronoIndicador').style.display = 'block';
            }
          }

          // Restaura visibilidade
          if (visivel) {
            document.getElementById('cronometro-widget').style.display = 'block';
            document.getElementById('cronometro-mini').style.display   = 'none';
            document.getElementById('cronoIndicador').style.display    = 'none';
          }
        }

        // ── Toggle do widget ─────────────────────────────────────────────
        function toggleCronometro() {
          const widget  = document.getElementById('cronometro-widget');
          const aberto  = widget.style.display !== 'none';
          if (aberto) {
            widget.style.display = 'none';
            localStorage.setItem(CRONO_KEY.VISIVEL, 'false');
            // Mostra indicador se estiver rodando
            const rodando = localStorage.getItem(CRONO_KEY.RODANDO) === 'true';
            if (rodando) {
              document.getElementById('cronoIndicador').style.display = 'block';
            }
          } else {
            widget.style.display = 'block';
            document.getElementById('cronometro-mini').style.display   = 'none';
            document.getElementById('cronoIndicador').style.display    = 'none';
            localStorage.setItem(CRONO_KEY.VISIVEL, 'true');
          }
        }

        function minimizarCrono() {
          document.getElementById('cronometro-widget').style.display = 'none';
          document.getElementById('cronometro-mini').style.display   = 'flex';
          localStorage.setItem(CRONO_KEY.VISIVEL, 'false');
          const rodando = localStorage.getItem(CRONO_KEY.RODANDO) === 'true';
          if (rodando) {
            document.getElementById('cronoIndicador').style.display = 'block';
          }
        }

        function maximizarCrono() {
          document.getElementById('cronometro-widget').style.display = 'block';
          document.getElementById('cronometro-mini').style.display   = 'none';
          document.getElementById('cronoIndicador').style.display    = 'none';
          localStorage.setItem(CRONO_KEY.VISIVEL, 'true');
        }

        // ── Carregar matérias ────────────────────────────────────────────
        function carregarMaterias() {
          return fetch('/api/materias')
            .then(res => res.json())
            .then(data => {
              const sel = document.getElementById('cronoMateria');
              const valorAtual = sel.value;
              sel.innerHTML =
                '<option value="">Selecione a matéria...</option>';
              data.forEach(m => {
                const opt       = document.createElement('option');
                opt.value       = m.id;
                opt.textContent = m.nome;
                sel.appendChild(opt);
              });
              if (valorAtual) sel.value = valorAtual;
            })
            .catch(() => {});
        }

        // ── Controles ────────────────────────────────────────────────────
        function iniciarCrono() {
          const rodando = localStorage.getItem(CRONO_KEY.RODANDO) === 'true';
          if (rodando) return;

          // Salva timestamp de início e marca como rodando
          const segundosBase = parseInt(
            localStorage.getItem(CRONO_KEY.SEGUNDOS) || '0');
          localStorage.setItem(CRONO_KEY.RODANDO,  'true');
          localStorage.setItem(CRONO_KEY.INICIO,   Date.now().toString());
          localStorage.setItem(CRONO_KEY.SEGUNDOS, segundosBase.toString());

          // Salva matéria e assunto
          const materiaId = document.getElementById('cronoMateria').value;
          const assunto   = document.getElementById('cronoAssunto').value;
          if (materiaId) localStorage.setItem(CRONO_KEY.MATERIA_ID, materiaId);
          if (assunto)   localStorage.setItem(CRONO_KEY.ASSUNTO, assunto);

          document.getElementById('cronoDisplay').style.color = '#27AE60';
          document.getElementById('cronoStatus').style.display = 'block';
          document.getElementById('cronoResultado').style.display = 'none';

          setBtn('btnIniciar', true);
          setBtn('btnPausar',  false);
          setBtn('btnParar',   false);

          cronoIntervalo = setInterval(() => {
            const ini   = parseInt(localStorage.getItem(CRONO_KEY.INICIO));
            const base  = parseInt(localStorage.getItem(CRONO_KEY.SEGUNDOS));
            const total = base + Math.floor((Date.now() - ini) / 1000);
            atualizarDisplayComValor(total);
            atualizarIndicador(total, true);
          }, 1000);
        }

        function pausarCrono() {
          const rodando = localStorage.getItem(CRONO_KEY.RODANDO) === 'true';
          if (!rodando) return;

          clearInterval(cronoIntervalo);

          // Salva os segundos acumulados até agora
          const ini   = parseInt(localStorage.getItem(CRONO_KEY.INICIO));
          const base  = parseInt(localStorage.getItem(CRONO_KEY.SEGUNDOS));
          const total = base + Math.floor((Date.now() - ini) / 1000);

          localStorage.setItem(CRONO_KEY.RODANDO,  'false');
          localStorage.setItem(CRONO_KEY.SEGUNDOS, total.toString());

          document.getElementById('cronoDisplay').style.color = '#E67E22';
          document.getElementById('cronoStatus').style.display = 'none';
          atualizarIndicador(total, false);

          setBtn('btnIniciar', false);
          setBtn('btnPausar',  true);
        }

        function pararCrono() {
          clearInterval(cronoIntervalo);

          const ini   = parseInt(
            localStorage.getItem(CRONO_KEY.INICIO) || Date.now().toString());
          const base  = parseInt(
            localStorage.getItem(CRONO_KEY.SEGUNDOS) || '0');
          const rodando = localStorage.getItem(CRONO_KEY.RODANDO) === 'true';
          const total = rodando
                ? base + Math.floor((Date.now() - ini) / 1000)
                : base;

          localStorage.setItem(CRONO_KEY.RODANDO,  'false');
          localStorage.setItem(CRONO_KEY.SEGUNDOS, total.toString());

          document.getElementById('cronoDisplay').style.color = '#1B3A6B';
          document.getElementById('cronoStatus').style.display = 'none';
          document.getElementById('tempoRegistrado').textContent =
            formatarTempo(total);
          document.getElementById('cronoResultado').style.display = 'block';
          document.getElementById('cronoSalvoMsg').style.display  = 'none';
          document.getElementById('btnSalvarRegistro').style.display =
            'inline-block';

          atualizarIndicador(total, false);
          document.getElementById('cronoIndicador').style.display = 'none';

          setBtn('btnIniciar', false);
          setBtn('btnPausar',  true);
          setBtn('btnParar',   true);
        }

        function resetarCrono() {
          clearInterval(cronoIntervalo);

          // Limpa localStorage
          Object.values(CRONO_KEY).forEach(k => localStorage.removeItem(k));

          document.getElementById('cronoDisplay').textContent = '00:00:00';
          document.getElementById('cronoDisplay').style.color = '#1B3A6B';
          document.getElementById('cronoStatus').style.display  = 'none';
          document.getElementById('cronoResultado').style.display = 'none';
          document.getElementById('cronoAssunto').value = '';
          document.getElementById('cronoMateria').value = '';
          document.getElementById('cronoIndicador').style.display = 'none';

          setBtn('btnIniciar', false);
          setBtn('btnPausar',  true);
          setBtn('btnParar',   true);
        }

        // ── Salvar registro ──────────────────────────────────────────────
        function salvarRegistro() {
          const materiaId = document.getElementById('cronoMateria').value ||
                            localStorage.getItem(CRONO_KEY.MATERIA_ID);
          const assunto   = document.getElementById('cronoAssunto').value ||
                            localStorage.getItem(CRONO_KEY.ASSUNTO);
          const segundos  = parseInt(
            localStorage.getItem(CRONO_KEY.SEGUNDOS) || '0');
          const minutos   = Math.max(1, Math.ceil(segundos / 60));

          if (!materiaId) {
            alert('⚠️ Selecione a matéria antes de salvar!');
            return;
          }
          if (!assunto) {
            alert('⚠️ Informe o assunto estudado antes de salvar!');
            return;
          }

          const hoje = new Date().toISOString().split('T')[0];

          const dados = {
            data:               hoje,
            materiaId:          parseInt(materiaId),
            assunto:            assunto,
            tipo:               'TEORIA',
            tempoPlanejado:     minutos,
            tempoReal:          minutos,
            questoesResolvidas: 0,
            acertos:            0,
            observacoes:        'Registrado pelo cronômetro'
          };

          fetch('/api/registro', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(dados)
          })
          .then(res => {
            if (res.ok) {
              document.getElementById('cronoSalvoMsg').style.display = 'block';
              document.getElementById('btnSalvarRegistro').style.display = 'none';
              // Limpa localStorage após salvar
              Object.values(CRONO_KEY).forEach(k => localStorage.removeItem(k));
            } else {
              alert('❌ Erro ao salvar. Tente novamente.');
            }
          })
          .catch(() => alert('❌ Erro ao salvar. Tente novamente.'));
        }

        // ── Helpers ──────────────────────────────────────────────────────
        function atualizarDisplayComValor(segundos) {
          document.getElementById('cronoDisplay').textContent =
            formatarTempo(segundos);
        }

        function atualizarIndicador(segundos, rodando) {
          const ind = document.getElementById('cronoIndicador');
          document.getElementById('cronoIndicadorTempo').textContent =
            formatarTempo(segundos);
          const widget  = document.getElementById('cronometro-widget');
          const aberto  = widget.style.display !== 'none';
          if (rodando && !aberto) {
            ind.style.display = 'block';
          } else {
            ind.style.display = 'none';
          }
        }

        function setBtn(id, desabilitado) {
          const btn = document.getElementById(id);
          if (!btn) return;
          btn.disabled      = desabilitado;
          btn.style.opacity = desabilitado ? '0.5' : '1';
        }

        function formatarTempo(s) {
          const h   = Math.floor(s / 3600);
          const m   = Math.floor((s % 3600) / 60);
          const seg = s % 60;
          return String(h).padStart(2,'0') + ':' +
                 String(m).padStart(2,'0') + ':' +
                 String(seg).padStart(2,'0');
        }

        // Salva matéria/assunto quando mudar
        document.addEventListener('DOMContentLoaded', () => {
          document.getElementById('cronoMateria')
            .addEventListener('change', e => {
              localStorage.setItem(CRONO_KEY.MATERIA_ID, e.target.value);
            });
          document.getElementById('cronoAssunto')
            .addEventListener('input', e => {
              localStorage.setItem(CRONO_KEY.ASSUNTO, e.target.value);
            });
        });
    </script>

</div>
</body>
</html>
