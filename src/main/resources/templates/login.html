<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Estudos Concursos</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
          background: linear-gradient(135deg, #1B3A6B 0%, #2E6DA4 100%);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .login-card {
          background: white;
          border-radius: 20px;
          padding: 40px;
          width: 100%;
          max-width: 420px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
          text-align: center;
          margin-bottom: 30px;
        }
        .login-logo h1 {
          font-size: 2rem;
          font-weight: 900;
          color: #1B3A6B;
        }
        .login-logo p {
          color: #7F8C8D;
          font-size: 0.9rem;
          margin: 0;
        }
        .form-control {
          border-radius: 10px;
          padding: 12px 16px;
          border: 2px solid #E8EDF2;
          font-size: 0.95rem;
        }
        .form-control:focus {
          border-color: #2E6DA4;
          box-shadow: none;
        }
        .btn-login {
          background: linear-gradient(135deg, #1B3A6B, #2E6DA4);
          color: white;
          border: none;
          border-radius: 10px;
          padding: 12px;
          font-size: 1rem;
          font-weight: bold;
          width: 100%;
          cursor: pointer;
          transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; }
        .form-label {
          font-weight: bold;
          color: #2C3E50;
          font-size: 0.9rem;
        }
        .input-icon {
          position: relative;
        }
        .input-icon span {
          position: absolute;
          left: 12px;
          top: 50%;
          transform: translateY(-50%);
          font-size: 1.1rem;
        }
        .input-icon input {
          padding-left: 40px;
        }
    </style>
</head>
<body>

<div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
        <h1>📚 Estudos</h1>
        <p>Sistema de Controle para Concursos Públicos</p>
    </div>

    <!-- Alerta de erro -->
    <div th:if="${erro}"
         class="alert alert-danger rounded-3 text-center"
         style="font-size:0.9rem;">
        ❌ <span th:text="${erro}"></span>
    </div>

    <!-- Alerta de sucesso (saiu) -->
    <div th:if="${sucesso}"
         class="alert alert-success rounded-3 text-center"
         style="font-size:0.9rem;">
        ✅ <span th:text="${sucesso}"></span>
    </div>

    <!-- Formulário -->
    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <div class="input-icon">
                <span>👤</span>
                <input type="text" name="username" class="form-control"
                       placeholder="Digite seu usuário" required autofocus>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Senha</label>
            <div class="input-icon">
                <span>🔒</span>
                <input type="password" name="password" class="form-control"
                       placeholder="Digite sua senha" required>
            </div>
        </div>

        <button type="submit" class="btn-login">
            Entrar →
        </button>

    </form>

    <div class="text-center mt-4" style="font-size:0.8rem; color:#BDC3C7;">
        Sistema de Estudos para Concursos Públicos
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
